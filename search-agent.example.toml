# Example config for the keyword-search document agent.
# Copy to search-agent.toml for local use.
# Keep real API keys out of committed files.

data_dir = "D:/查询机器人资料/本地数据"
model = "deepseek-v4-pro"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

[search]
max_rounds = 3
top_k = 8

[agent]
max_tool_steps = 8

[logging]
enabled = true
level = "INFO"
file = "logs/search-agent.log"

[web_fetch]
enabled = true
provider = "jina"
fallback_provider = "crawl4ai"
max_pages = 2
max_chars_per_page = 15000
timeout_seconds = 10

[secrets]
dashscope_api_key = ""
bocha_api_key = ""
